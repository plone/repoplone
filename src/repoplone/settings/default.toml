[repository]
__root__ = "./"
name = ""
changelog = "CHANGELOG.md"
version = "version.txt"
container_images_prefix = ""
compose = ["docker-compose.yml"]
version_format = "semver"

[repository.towncrier]
enabled = false
section = ""
settings = ""

# Optional release pipeline configuration. When omitted, the default
